[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "18"
  # Disable secrets scanning for NEXT_PUBLIC_* variables (they're meant to be public)
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_APP_URL"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
  # Increase payload limit for file uploads
  included_files = ["**/*"]
  
[[functions]]
  # Increase size limit for API routes handling uploads
  path = "/api/*"
  node_bundler = "esbuild"
  
[functions."api/*"]
  # Max function size for uploads
  max_duration = 60
